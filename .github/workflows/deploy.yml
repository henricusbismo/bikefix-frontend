name: Deploy Astro to bunny.net

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wordpress_published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Astro Site
        run: npm run build
        env:
          WORDPRESS_API_URL: "https://bikefixdb.biz.id/wp-json"

      - name: Deploy Production Files to Bunny Storage
        uses: samuelmeuli/action-bunnycdn@v2
        with:
          # Your Main Bunny Account API Key
          api_key: ${{ secrets.BUNNY_ACCOUNT_API_KEY }}
          storage_zone: 'bikefixdb'
          pull_zone: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          upload: true
          remove_old: true
          local_path: './dist'