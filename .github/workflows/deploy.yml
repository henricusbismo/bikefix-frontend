name: Deploy Astro to bunny.net

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wordpress_published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Astro Site
        run: npm run build
        env:
          WORDPRESS_API_URL: "https://bikefixdb.biz.id/?rest_route="

      - name: Deploy Production Files to Bunny Storage
        uses: ayeressian/bunnycdn-storage-deploy@v2.4.5
        with:
          source: "dist"
          storageZoneName: "bikefixdb"
          storageEndpoint: "ny.storage.bunnycdn.com"
          storagePassword: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          accessKey: ${{ secrets.BUNNY_ACCOUNT_API_KEY }}
          pullZoneId: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          upload: "true"
          remove: "true"