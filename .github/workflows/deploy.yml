name: Deploy Astro to bunny.net

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wordpress_published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Astro Site
        run: npm run build
        env:
          WORDPRESS_API_URL: "https://bikefixdb.biz.id/wp-json"

      - name: BunnyCDN Deploy
        uses: dustuu/Dustuu.Actions.BunnyCdnDeploy@0.1.5
        env:
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          BUNNY_STORAGE_ZONE: 'bikefix'
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          UPLOAD_DIR: './dist'