name: Deploy Astro to bunny.net

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wordpress_published]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Astro Site
        run: npm run build
        env:
          WORDPRESS_API_URL: "https://bikefixdb.biz.id/wp-json"

      - name: Deploy Production Files to bunny.net Storage
        uses: amandis/bunny-cdn-deploy-action@v1.1.2
        with:
          source: './dist'
          storageZoneName: 'bikefix'
          storageZonePassword: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          pullZoneId: ${{ secrets.BUNNY_PULL_ZONE_ID }}
          clearZoneCache: true